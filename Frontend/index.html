<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multilingual Email</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="tabs">
            <button id="btn-login" class="tab-btn active">Login</button>
            <button id="btn-register" class="tab-btn">Register</button>
        </div>

        <div id="login-tab" class="auth-form">
            <h2>Secure Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <input type="text" id="login-totp" placeholder="6-Digit 2FA Code" maxlength="6">
            <button onclick="handleLogin()">Access Vault</button>
            <p id="login-error" class="error-msg"></p>
        </div>

        <div id="register-tab" class="auth-form hidden">
            <h2>Create Secure Account</h2>
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password (Min 12 chars, Special, Upper)">
            
            <label>Primary Language</label>
            <select id="reg-lang1">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
            </select>

            <label>Secondary Language</label>
            <select id="reg-lang2">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
            </select>

            <button onclick="handleRegister()">Generate Keys & Register</button>
            
            <div id="qr-container" class="hidden">
                <p>Scan this with Authenticator App:</p>
                <img id="qr-image" src="" alt="2FA QR">
                <p><strong>Once scanned, switch to Login tab.</strong></p>
            </div>
            <p id="reg-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-screen" class="app-container hidden">
        <div class="sidebar">
            <div class="user-profile" id="user-display">user@example.com</div>
            <button onclick="showCompose()">✉ Compose</button>
            <button onclick="loadInbox()">📥 Inbox</button>
            <button onclick="loadSent()">📤 Sent</button>
            <button onclick="logout()" class="logout-btn">🚪 Logout</button>
        </div>

        <div class="main-content">
            <div id="email-list-view">
                <h3 id="folder-title">Inbox</h3>
                <div id="email-list" class="email-list">
                    </div>
            </div>

            <div id="compose-view" class="hidden">
                <h3>Compose Secure Email</h3>
                <input type="email" id="comp-to" placeholder="Recipient Email">
                <input type="text" id="comp-subject" placeholder="Subject">
                <textarea id="comp-body" rows="15" placeholder="Message body..."></textarea>
                <button onclick="sendEmail()">Send Encrypted</button>
                <p id="comp-status"></p>
            </div>

            <div id="read-view" class="hidden">
                <button onclick="backToList()">← Back</button>
                <div class="email-header">
                    <h2 id="read-subject">Subject</h2>
                    <div id="security-badge" class="badge">Checking Security...</div>
                    <p>From: <span id="read-from"></span></p>
                    <p>Date: <span id="read-date"></span></p>
                </div>
                <div id="read-warnings" class="warnings-box hidden"></div>
                <div id="read-body" class="email-body"></div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>

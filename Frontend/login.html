<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multilingual Email Security</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <h1>Multilingual Email Security</h1>
            <p>Secure email system with intelligent warnings</p>
        </div>
        
        <div class="login-form">
            <h2>Sign In</h2>
            
            <div class="form-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            
            <div class="form-group">
                <label for="language">Preferred Language</label>
                <select id="language">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="hi">Hindi</option>
                </select>
            </div>
            
            <button id="loginBtn" class="btn-primary">Sign In</button>
            
            <div class="login-links">
                <a href="#" id="createAccount">Create new account</a>
                <a href="#" id="forgotPassword">Forgot password?</a>
            </div>
        </div>
        
        <div class="security-features">
            <h3>Security Features</h3>
            <ul>
                <li>✓ Multilingual Security Warnings</li>
                <li>✓ Two-Factor Authentication</li>
                <li>✓ Community Flagging System</li>
                <li>✓ Smart Spam Detection</li>
            </ul>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Secure Email</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button id="btn-login" class="tab-btn active">Login</button>
            <button id="btn-register" class="tab-btn">Register</button>
        </div>

        <div id="login-tab" class="auth-form">
            <h2>Secure Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <input type="text" id="login-totp" placeholder="6-Digit 2FA Code" maxlength="6">
            <button id="submit-login">Access Vault</button>
            <p id="login-error" class="error-msg"></p>
        </div>

        <div id="register-tab" class="auth-form hidden">
            <h2>Register</h2>
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password (Min 12 chars)">
            <select id="reg-lang1"><option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="be">Bengali</option>
                <option value="te">Telugu</option>
                <option value="hi">Hindi</option>
                <option value="ta">Tamil</option>
                <option value="mr">Marathi</option>
                <option value="ur">Urdu</option>
                <option value="pa">Punjabi</option>
                <option value="gu">Gujarati</option>
                <option value="kn">Kannada</option>
                <option value="ml">Malayalam</option>
                <option value="or">Odia</option>
            </select>
            <select id="reg-lang2"><option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="be">Bengali</option>
                <option value="te">Telugu</option>
                <option value="hi">Hindi</option>
                <option value="ta">Tamil</option>
                <option value="mr">Marathi</option>
                <option value="ur">Urdu</option>
                <option value="pa">Punjabi</option>
                <option value="gu">Gujarati</option>
                <option value="kn">Kannada</option>
                <option value="ml">Malayalam</option>
                <option value="or">Odia</option>
            </select>
            <button id="submit-register">Generate Keys</button>
            
            <div id="qr-container" class="hidden">
                <img id="qr-image" src="" alt="QR Code">
                <p>Scan this, then Login.</p>
            </div>
            <p id="reg-error" class="error-msg"></p>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
